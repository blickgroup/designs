<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Source+Serif+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#ffffff; color:#1f1f1f; font-family: 'Source Serif Pro', Charter, serif; }
  .card { padding:32px; height:100%; display:flex; flex-direction:column; gap:16px; }
  .card-mark { font-family: 'Proxima Nova', Inter, sans-serif; font-weight:700; font-size:36px; line-height:1; color:#0a0a0a; letter-spacing:-.02em; margin:0; }
  .card-tag { font-family: 'Source Serif Pro', Charter, serif; font-style:italic; font-size:14px; color:#f05323; margin:0; }
  .card-essence { font-family: 'Source Serif Pro', Charter, serif; font-size:13px; line-height:1.55; color:#1f1f1f; margin:0; flex:1; max-width:42ch; }
  .card-strip { display:flex; gap:0; height:24px; border-radius:3px; overflow:hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); }
  .card-strip span { flex:1; }
  .card-foot { display:flex; gap:12px; align-items:baseline; font-family: Inter, sans-serif; font-size:11px; color:#5a5a5a; text-transform:uppercase; letter-spacing:.06em; }
  .card-foot strong { color:#0a0a0a; font-weight:700; }
</style></head>
<body>
<div class="card">
  <h2 class="card-mark">Hub-App</h2>
  <div class="card-tag">A senior advisor's notebook.</div>
  <p class="card-essence">Hub-app is the operations tool that ~11 internal users live in for hours a day. Calm, dense, get-out-of-the-way.</p>
  <div class="card-strip"><span style="background:#f05323"></span><span style="background:#ff6a3d"></span><span style="background:#22d3ee"></span><span style="background:#1a1a1a"></span><span style="background:#2a2a2a"></span><span style="background:#3a3a3a"></span></div>
  <div class="card-foot"><strong>hub-app</strong> · Inter</div>
</div>
</body></html>
