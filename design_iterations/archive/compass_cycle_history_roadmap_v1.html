<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compass — Cycle Lifecycle: Journeys D & E</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ─── Design Tokens ─────────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --primary: #f05323;
      --primary-hover: #ff6a3d;
      --bg-page: #1a1a1a;
      --bg-surface: #2a2a2a;
      --bg-surface-secondary: #262626;
      --bg-hover: #3a3a3a;
      --bg-primary: #212121;
      --bg-secondary: #2a2a2a;
      --text-heading: #ffffff;
      --text-primary: #bcbec0;
      --text-secondary: #a0a0a0;
      --text-muted: #707070;
      --border-default: #58595b;
      --border-hover: #707070;
      --button-primary-bg: #f05323;
      --button-primary-text: #ffffff;
      --button-secondary-bg: transparent;
      --button-secondary-text: #bcbec0;
      --button-secondary-border: #bcbec0;
      --input-bg: #2a2a2a;
      --input-border: #58595b;
      --input-text: #ffffff;
      --input-placeholder: #a0a0a0;
      --card-bg: rgba(255,255,255,0.03);
      --card-border: #58595b;
      --card-hover-border: #f05323;
      --success: #10b981;
      --success-bg: rgba(16,185,129,0.10);
      --success-border: rgba(16,185,129,0.25);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.08);
      --warning-border: rgba(245,158,11,0.20);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.10);
      --danger-border: rgba(239,68,68,0.25);
      --info: #4A9EFF;
      --info-bg: rgba(74,158,255,0.10);
      --info-border: rgba(74,158,255,0.25);
      --chart-1: #10b981;
      --chart-2: #f59e0b;
      --chart-3: #3b82f6;
      --chart-4: #8b5cf6;
      --chart-5: #ec4899;
      --chart-6: #14b8a6;
      --chart-7: #f97316;
      --chart-8: #6366f1;
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
    }

    [data-theme="light"] {
      --primary: #f05323;
      --primary-hover: #d63911;
      --bg-page: #f8fafc;
      --bg-surface: #f9fafb;
      --bg-surface-secondary: #f1f5f9;
      --bg-hover: #e5e7eb;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-heading: #000000;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-default: #e5e7eb;
      --border-hover: #d1d5db;
      --button-primary-bg: #f05323;
      --button-primary-text: #ffffff;
      --button-secondary-bg: transparent;
      --button-secondary-text: #111827;
      --button-secondary-border: #d1d5db;
      --input-bg: #ffffff;
      --input-border: #d1d5db;
      --input-text: #111827;
      --input-placeholder: #9ca3af;
      --card-bg: rgba(0,0,0,0.02);
      --card-border: #e5e7eb;
      --card-hover-border: #f05323;
      --success: #10b981;
      --success-bg: rgba(16,185,129,0.10);
      --success-border: rgba(16,185,129,0.25);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.08);
      --warning-border: rgba(245,158,11,0.20);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.10);
      --danger-border: rgba(239,68,68,0.25);
      --info: #4A9EFF;
      --info-bg: rgba(74,158,255,0.10);
      --info-border: rgba(74,158,255,0.25);
      --chart-1: #10b981;
      --chart-2: #f59e0b;
      --chart-3: #3b82f6;
      --chart-4: #8b5cf6;
      --chart-5: #ec4899;
      --chart-6: #14b8a6;
      --chart-7: #f97316;
      --chart-8: #6366f1;
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.15);
    }

    /* ─── Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── Top Bar ───────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-default);
      padding: 0 20px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-heading);
      letter-spacing: -0.01em;
    }
    .topbar-brand span { color: var(--primary); }
    .topbar-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .topbar-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border-default);
      background: var(--button-secondary-bg);
      color: var(--button-secondary-text);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { border-color: var(--primary); color: var(--primary); }
    .ctrl-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ─── Split Layout ──────────────────────────────────────────── */
    .view-wrapper { display: flex; width: 100%; }
    .panel {
      flex: 1;
      min-width: 0;
      padding: 28px 24px 48px;
      overflow-y: auto;
      position: relative;
    }
    .panel-divider {
      width: 1px;
      background: var(--border-default);
      flex-shrink: 0;
    }
    .panel-dark { background: var(--bg-page); }
    .panel-light { background: #f8fafc; }
    [data-theme="light"] .panel-dark { background: #f8fafc; }

    /* Single panel modes */
    body.mode-dark .panel-light,
    body.mode-dark .panel-divider { display: none; }
    body.mode-light .panel-dark,
    body.mode-light .panel-divider { display: none; }
    body.mode-dark .panel-dark,
    body.mode-light .panel-light { flex: 1; }

    /* ─── Section Headers ───────────────────────────────────────── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 3px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }
    .section-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .section-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .section-divider {
      border: none;
      border-top: 1px solid var(--border-default);
      margin: 36px 0;
    }

    /* ─── Trigger Button ────────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--button-primary-bg);
      color: var(--button-primary-text);
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    /* ─── Modal Overlay ─────────────────────────────────────────── */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 64px;
    }
    .modal-overlay.open { display: flex; }

    .modal-shell {
      width: 100%;
      max-width: 640px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin: 0 16px;
    }

    .modal-header {
      padding: 16px 20px 0;
      border-bottom: 1px solid var(--border-default);
    }
    .modal-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -0.02em;
    }
    .modal-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border-default);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-close:hover { border-color: var(--border-hover); color: var(--text-heading); }

    /* Modal Tabs */
    .modal-tabs {
      display: flex;
      gap: 0;
      margin-top: 0;
    }
    .tab-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .modal-body { padding: 20px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Details Tab */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .detail-field label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .detail-field .field-value {
      font-size: 12px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .detail-desc {
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.6;
      padding: 10px 12px;
      background: var(--bg-surface-secondary);
      border-radius: 6px;
      border: 1px solid var(--border-default);
      margin-bottom: 16px;
    }

    /* Status chips */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .chip-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .chip-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
    .chip-info { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }
    .chip-muted { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border-default); }
    .chip-primary { background: rgba(240,83,35,0.12); color: var(--primary); border: 1px solid rgba(240,83,35,0.3); }

    /* ─── History Timeline ──────────────────────────────────────── */
    .timeline {
      position: relative;
      padding-left: 28px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 10px;
      bottom: 10px;
      width: 2px;
      background: var(--border-default);
    }
    .timeline-entry {
      position: relative;
      margin-bottom: 16px;
    }
    .timeline-entry:last-child { margin-bottom: 0; }

    .timeline-dot {
      position: absolute;
      left: -24px;
      top: 10px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg-surface);
    }
    .dot-active {
      background: var(--primary);
      box-shadow: 0 0 0 3px rgba(240,83,35,0.2);
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }
    .dot-rolled { background: var(--warning); }
    .dot-past { background: var(--text-muted); }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(240,83,35,0.4); }
      70% { box-shadow: 0 0 0 6px rgba(240,83,35,0); }
      100% { box-shadow: 0 0 0 0 rgba(240,83,35,0); }
    }

    .timeline-card {
      background: var(--bg-surface-secondary);
      border: 1px solid var(--border-default);
      border-radius: 7px;
      padding: 10px 12px;
    }
    .timeline-card.current {
      border-left: 3px solid var(--primary);
    }
    .timeline-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .timeline-cycle-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-heading);
    }
    .timeline-date {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .timeline-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .timeline-meta-item {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .timeline-note {
      margin-top: 7px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      border-left: 2px solid var(--border-default);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .timeline-note.rolled {
      border-left-color: var(--warning);
    }
    .timeline-line-active {
      position: absolute;
      left: -20px;
      top: 22px;
      width: 2px;
      height: calc(100% + 16px);
      background: var(--primary);
      opacity: 0.5;
    }
    .show-more-link {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 10px;
      display: block;
      text-decoration: none;
    }
    .show-more-link:hover { color: var(--text-secondary); }

    /* ─── Roadmap ───────────────────────────────────────────────── */
    .roadmap-header {
      margin-bottom: 16px;
    }
    .roadmap-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -0.02em;
    }
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 5px 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 5px;
      color: var(--input-text);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .filter-select::after { content: ' ▾'; }
    .filter-chip-toggle {
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border-default);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip-toggle:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip-toggle.on { background: rgba(240,83,35,0.12); border-color: var(--primary); color: var(--primary); }

    /* Quarter grid */
    .quarter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .quarter-col {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .quarter-header {
      padding: 10px 12px;
      border-radius: 7px 7px 0 0;
      border: 1px solid var(--border-default);
      border-bottom: none;
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .quarter-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-heading);
    }
    .quarter-dates {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .quarter-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge-active { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .badge-published { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }
    .badge-draft { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border-default); }

    .quarter-cycles {
      border: 1px solid var(--border-default);
      border-radius: 0 0 7px 7px;
      overflow: hidden;
      background: var(--bg-surface-secondary);
    }

    /* Cycle row card */
    .cycle-row {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-default);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .cycle-row:last-of-type { border-bottom: none; }
    .cycle-row:hover { background: var(--bg-hover); }
    .cycle-row.future { opacity: 0.55; }
    .cycle-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.12s;
    }
    .cycle-row:hover::before { background: var(--primary); }
    .cycle-row.cycle-active::before { background: var(--primary); }

    .cycle-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 5px;
    }
    .cycle-row-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .expand-toggle {
      font-size: 9px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.12s;
      white-space: nowrap;
      padding: 2px 4px;
    }
    .expand-toggle:hover { color: var(--primary); }

    .cycle-chips {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      border: 1px solid var(--border-default);
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
    }
    .stat-chip.done { color: var(--success); border-color: var(--success-border); background: var(--success-bg); }
    .stat-chip.fire { color: var(--warning); border-color: var(--warning-border); background: var(--warning-bg); }
    .stat-chip.wip { color: var(--info); border-color: var(--info-border); background: var(--info-bg); }
    .carried-tag {
      font-size: 9px;
      color: var(--text-muted);
      margin-left: 2px;
    }

    /* Dashed placeholder cycle */
    .cycle-row-placeholder {
      padding: 10px;
      border-bottom: 1px dashed var(--border-default);
      text-align: center;
    }
    .cycle-row-placeholder:last-child { border-bottom: none; }
    .placeholder-inner {
      border: 1px dashed var(--border-default);
      border-radius: 5px;
      padding: 8px;
      color: var(--text-muted);
      font-size: 10px;
    }

    /* Quarter footer links */
    .quarter-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 2px 0;
    }
    .quarter-footer a {
      font-size: 10px;
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
    }
    .quarter-footer a:hover { color: var(--primary-hover); }

    /* Inline expanded ideas */
    .ideas-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .ideas-list.open { max-height: 300px; }
    .idea-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0 4px 0;
      border-top: 1px solid var(--border-default);
    }
    .idea-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .idea-name {
      flex: 1;
      font-size: 11px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .idea-assignee {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--bg-hover);
      border: 1px solid var(--border-default);
      font-size: 9px;
      font-weight: 700;
      color: var(--text-secondary);
      display: flex;
      align-items: center;

<script>
  // ─── Inject template into both panels ───────────────────────────
  function injectPanels() {
    const tpl = document.getElementById('panel-template');

    ['panel-dark', 'panel-light'].forEach(panelId => {
      const panel = document.getElementById(panelId);
      // Remove placeholder PanelContent tag
      panel.querySelectorAll('PanelContent').forEach(el => el.remove());
      const clone = tpl.content.cloneNode(true);
      panel.appendChild(clone);
    });
  }
  injectPanels();

  // ─── Wire up all interactive elements ───────────────────────────
  function wirePanel(panel) {
    const themeAttr = panel.classList.contains('panel-dark') ? 'dark' : 'light';
    panel.setAttribute('data-theme', themeAttr);

    // Modal open/close
    const openBtn = panel.querySelector('.open-modal-btn');
    const overlay = panel.querySelector('.modal-overlay');
    const closeBtn = panel.querySelector('.close-modal-btn');

    if (openBtn && overlay && closeBtn) {
      openBtn.addEventListener('click', () => overlay.classList.add('open'));
      closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('open');
      });
    }

    // Tab switching
    panel.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const modal = btn.closest('.modal-shell');
        const tabName = btn.getAttribute('data-tab');
        modal.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        modal.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        modal.querySelector(`[data-tab-content="${tabName}"]`).classList.add('active');
      });
    });

    // Expand/collapse cycle rows (Option B)
    panel.querySelectorAll('.expand-btn').forEach(btn => {
      const row = btn.closest('.expandable-row');
      const list = row.querySelector('.ideas-list');
      // Initialize state from data-expanded attribute
      if (row.getAttribute('data-expanded') === 'true') {
        list.classList.add('open');
      }
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = list.classList.toggle('open');
        btn.textContent = isOpen ? '▾ Hide ideas' : '▸ Show ideas';
      });
    });

    // Filter carried toggle
    panel.querySelectorAll('.filter-chip-toggle').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('on'));
    });
  }

  document.querySelectorAll('.panel').forEach(p => wirePanel(p));

  // ─── Light panel: force light theme on elements ─────────────────
  function applyPanelTheme() {
    const lightPanel = document.getElementById('panel-light');
    if (lightPanel) lightPanel.setAttribute('data-theme', 'light');
    const darkPanel = document.getElementById('panel-dark');
    if (darkPanel) darkPanel.setAttribute('data-theme', 'dark');
  }
  applyPanelTheme();

  // ─── View Mode Toggle ────────────────────────────────────────────
  function setMode(mode) {
    document.body.className = 'mode-' + mode;
    ['btn-split','btn-dark','btn-light'].forEach(id => {
      document.getElementById(id).classList.remove('active');
    });
    document.getElementById('btn-' + mode).classList.add('active');

    // In single-panel modes, apply correct theme to full page
    const root = document.documentElement;
    if (mode === 'light') {
      root.setAttribute('data-theme', 'light');
    } else {
      root.setAttribute('data-theme', 'dark');
    }
  }
</script>
